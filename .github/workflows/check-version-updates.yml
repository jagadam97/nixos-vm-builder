name: Check for Updates

on:
  workflow_run:
    workflows: ["Build and Deploy LXC Containers"]
    types:
      - completed
    branches: [ main ]
  schedule:
    - cron: '30 11 * * *'  # Run daily at 5 AM IST (11:30 UTC)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Discover containers
        id: discover
        run: |
          # Find all container directories (excluding common)
          CONTAINERS=$(ls -d containers/*/ 2>/dev/null | xargs -n1 basename | grep -v '^common$' | tr '\n' ' ')
          echo "containers=$CONTAINERS" >> $GITHUB_OUTPUT
          echo "Found containers: $CONTAINERS"

      - name: Get current versions
        id: current
        run: |
          # Extract current versions from all containers
          for container in ${{ steps.discover.outputs.containers }}; do
            version=$(nix eval --raw ".#${container}-lxc.config.environment.etc.\"build-info.txt\".text" 2>/dev/null | grep -oP 'Version: \K[0-9.]+' | head -1 || echo 'unknown')
            echo "${container}=${version}" >> $GITHUB_OUTPUT
            echo "${container}: ${version}"
          done

      - name: Check for flake updates
        id: update
        run: |
          # Update flake.lock to get latest nixpkgs
          nix flake update --commit-lock-file 2>/dev/null || true

          # Check if flake.lock changed
          if git diff --quiet flake.lock; then
            echo "has_updates=false" >> $GITHUB_OUTPUT
          else
            echo "has_updates=true" >> $GITHUB_OUTPUT
          fi

      - name: Get new versions
        if: steps.update.outputs.has_updates == 'true'
        id: new
        run: |
          for container in ${{ steps.discover.outputs.containers }}; do
            version=$(nix eval --raw ".#${container}-lxc.config.environment.etc.\"build-info.txt\".text" 2>/dev/null | grep -oP 'Version: \K[0-9.]+' | head -1 || echo 'unknown')
            echo "${container}=${version}" >> $GITHUB_OUTPUT
            echo "${container}: ${version}"
          done

      - name: Build all containers
        if: steps.update.outputs.has_updates == 'true'
        id: build
        run: |
          BUILD_STATUS=0
          BUILD_RESULTS=""

          # Build all discovered containers
          for container in ${{ steps.discover.outputs.containers }}; do
            echo "Building ${container}-lxc..."
            if make "${container}-lxc" 2>&1 | tee "build-${container}.log"; then
              BUILD_RESULTS="${BUILD_RESULTS}✅ ${container}-lxc: built successfully\n"
            else
              BUILD_RESULTS="${BUILD_RESULTS}❌ ${container}-lxc: build failed\n"
              BUILD_STATUS=1
            fi
          done

          echo "build_status=$BUILD_STATUS" >> $GITHUB_OUTPUT
          echo "build_results<<EOF" >> $GITHUB_OUTPUT
          echo -e "$BUILD_RESULTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create PR if builds pass
        if: steps.update.outputs.has_updates == 'true' && steps.build.outputs.build_status == '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Build version changes list
          VERSION_CHANGES=""
          for container in ${{ steps.discover.outputs.containers }}; do
            old_ver="${{ steps.current.outputs[container] }}"
            new_ver="${{ steps.new.outputs[container] }}"
            VERSION_CHANGES="${VERSION_CHANGES}- ${container}: ${old_ver} -> ${new_ver}\n"
          done

          # Commit flake.lock update
          git add flake.lock
          git commit -m "Update flake.lock - new container versions

          ## Version Changes
          ${VERSION_CHANGES}

          ## Build Results
          ${{ steps.build.outputs.build_results }}

          All builds passed. Safe to merge."

          BRANCH="update-flake-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "Update flake.lock - container version updates" \
            --body "## Version Changes

          ${VERSION_CHANGES}

          ## Build Results

          ${{ steps.build.outputs.build_results }}

          All builds have passed. This PR is safe to merge.

          **Merging this PR will:**
          1. Update container versions
          2. Trigger a new release build
          3. Create a new GitHub release"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build failed - revert and notify
        if: steps.update.outputs.has_updates == 'true' && steps.build.outputs.build_status != '0'
        run: |
          echo "Build failed! Reverting changes."
          git checkout flake.lock

          # Build version changes list
          VERSION_CHANGES=""
          for container in ${{ steps.discover.outputs.containers }}; do
            old_ver="${{ steps.current.outputs[container] }}"
            new_ver="${{ steps.new.outputs[container] }}"
            VERSION_CHANGES="${VERSION_CHANGES}- ${container}: ${old_ver} -> ${new_ver}\n"
          done

          # Create an issue to notify
          gh issue create \
            --title "Container build failed after flake update" \
            --body "## Build Failure

          The automated update check found new versions but builds failed.

          ## Build Results

          ${{ steps.build.outputs.build_results }}

          ## Versions Attempted
          ${VERSION_CHANGES}

          Please investigate and fix manually." || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No updates needed
        if: steps.update.outputs.has_updates != 'true'
        run: |
          echo "No updates available. All containers are using the latest versions."
          echo "Current versions:"
          for container in ${{ steps.discover.outputs.containers }}; do
            echo "- ${container}: ${{ steps.current.outputs[container] }}"
          done
