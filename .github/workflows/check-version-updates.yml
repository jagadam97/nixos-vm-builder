name: Check for Updates

on:
  workflow_run:
    workflows: ["Build and Deploy LXC Containers"]
    types:
      - completed
    branches: [ main ]
  schedule:
    - cron: '30 11 * * *'  # Run daily at 5 AM IST (11:30 UTC)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Discover containers
        id: discover
        run: |
          # Find all container directories (excluding common)
          CONTAINERS=$(ls -d containers/*/ 2>/dev/null | xargs -n1 basename | grep -v '^common$' | tr '\n' ' ')
          echo "containers=$CONTAINERS" >> $GITHUB_OUTPUT
          echo "Found containers: $CONTAINERS"

      - name: Check versions and build if changed
        id: check-and-build
        run: |
          # Get current versions
          declare -A OLD_VERSIONS
          echo "Current versions:"
          for container in ${{ steps.discover.outputs.containers }}; do
            VERSION=$(nix eval --raw ".#nixosConfigurations.${container}-lxc.config.environment.etc.\"build-info.txt\".text" 2>/dev/null | grep -oP 'Version: \K[0-9.]+' | head -1 || echo 'unknown')
            OLD_VERSIONS[$container]=$VERSION
            echo "  ${container}: ${VERSION}"
          done

          # Update flake.lock
          nix flake update

          # Get new versions
          declare -A NEW_VERSIONS
          echo ""
          echo "New versions:"
          for container in ${{ steps.discover.outputs.containers }}; do
            VERSION=$(nix eval --raw ".#nixosConfigurations.${container}-lxc.config.environment.etc.\"build-info.txt\".text" 2>/dev/null | grep -oP 'Version: \K[0-9.]+' | head -1 || echo 'unknown')
            NEW_VERSIONS[$container]=$VERSION
            echo "  ${container}: ${VERSION}"
          done

          # Check for changes
          HAS_CHANGES=false
          VERSION_CHANGES=""

          for container in ${{ steps.discover.outputs.containers }}; do
            OLD="${OLD_VERSIONS[$container]}"
            NEW="${NEW_VERSIONS[$container]}"

            if [ "$OLD" != "$NEW" ]; then
              HAS_CHANGES=true
              VERSION_CHANGES="${VERSION_CHANGES}- ${container}: ${OLD} -> ${NEW}\n"
              echo ""
              echo "Changed: ${container} ${OLD} -> ${NEW}"
            fi
          done

          echo ""
          echo "has_changes=${HAS_CHANGES}" >> $GITHUB_OUTPUT
          echo "version_changes<<EOF" >> $GITHUB_OUTPUT
          echo -e "$VERSION_CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Build if there are changes
          if [ "$HAS_CHANGES" = "true" ]; then
            BUILD_STATUS=0
            BUILD_RESULTS=""

            echo ""
            echo "Building containers..."

            for container in ${{ steps.discover.outputs.containers }}; do
              echo "Building ${container}-lxc..."
              if make "${container}-lxc" 2>&1 | tee "build-${container}.log"; then
                BUILD_RESULTS="${BUILD_RESULTS}✅ ${container}-lxc: built successfully\n"
              else
                BUILD_RESULTS="${BUILD_RESULTS}❌ ${container}-lxc: build failed\n"
                BUILD_STATUS=1
              fi
            done

            echo "build_status=$BUILD_STATUS" >> $GITHUB_OUTPUT
            echo "build_results<<EOF" >> $GITHUB_OUTPUT
            echo -e "$BUILD_RESULTS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "build_status=0" >> $GITHUB_OUTPUT
            echo "build_results=No builds needed - no version changes" >> $GITHUB_OUTPUT
          fi

      - name: Create PR if builds pass
        if: steps.check-and-build.outputs.has_changes == 'true' && steps.check-and-build.outputs.build_status == '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add flake.lock
          git commit -m "Update flake.lock - new container versions

          ## Version Changes
          ${{ steps.check-and-build.outputs.version_changes }}

          ## Build Results
          ${{ steps.check-and-build.outputs.build_results }}

          All builds passed. Safe to merge."

          BRANCH="update-flake-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "Update flake.lock - container version updates" \
            --body "## Version Changes

          ${{ steps.check-and-build.outputs.version_changes }}

          ## Build Results

          ${{ steps.check-and-build.outputs.build_results }}

          All builds have passed. This PR is safe to merge.

          **Merging this PR will:**
          1. Update container versions
          2. Trigger a new release build
          3. Create a new GitHub release"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build failed - revert and notify
        if: steps.check-and-build.outputs.has_changes == 'true' && steps.check-and-build.outputs.build_status != '0'
        run: |
          echo "Build failed! Reverting changes."
          git checkout flake.lock

          gh issue create \
            --title "Container build failed after flake update" \
            --body "## Build Failure

          The automated update check found new versions but builds failed.

          ## Build Results

          ${{ steps.check-and-build.outputs.build_results }}

          ## Versions Attempted

          ${{ steps.check-and-build.outputs.version_changes }}

          Please investigate and fix manually." || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No version changes
        if: steps.check-and-build.outputs.has_changes != 'true'
        run: |
          echo "No package version changes detected. Skipping PR creation."
          git checkout flake.lock
