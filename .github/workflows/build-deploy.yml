name: Build and Deploy LXC Containers

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        container:
          - influxdb-lxc
            
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build ${{ matrix.container }}
        run: |
          make ${{ matrix.container }}

      - name: Find built tarball
        id: tarball
        run: |
          TARBALL=$(ls nixos-image-lxc-*.tar.xz)
          echo "path=${TARBALL}" >> $GITHUB_OUTPUT
          echo "name=${TARBALL}" >> $GITHUB_OUTPUT
          echo "Found: ${TARBALL}"
          
          # Get file size for display
          SIZE=$(du -h ${TARBALL} | cut -f1)
          echo "size=${SIZE}" >> $GITHUB_OUTPUT

      - name: Upload to Proxmox
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          PROXMOX_HOST: ${{ secrets.PROXMOX_HOST }}
          PROXMOX_USER: ${{ secrets.PROXMOX_USER }}
          PROXMOX_PASSWORD: ${{ secrets.PROXMOX_PASSWORD }}
          PROXMOX_NODE: ${{ secrets.PROXMOX_NODE }}
          PROXMOX_STORAGE: ${{ secrets.PROXMOX_STORAGE }}
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          ./scripts/upload-to-proxmox.sh ${{ steps.tarball.outputs.path }}

      - name: Generate release tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: release_tag
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          TAG="build-${TIMESTAMP}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Release tag: ${TAG}"

      - name: Create Latest Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: "Build ${{ steps.release_tag.outputs.tag }}"
          files: ${{ steps.tarball.outputs.path }}
          body: |
            **Automated build from commit:** ${{ github.sha }}
            
            **Container:** ${{ matrix.container }}
            **Size:** ${{ steps.tarball.outputs.size }}
            **Commit:** ${{ github.event.head_commit.message }}
            
            ### Uploaded to Proxmox
            - Storage: `${{ secrets.PROXMOX_STORAGE }}:vztmpl/${{ steps.tarball.outputs.name }}`
            
            ### Files
            - `${{ steps.tarball.outputs.name }}`
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Versioned Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.tarball.outputs.path }}
          body: |
            **Version Release:** ${{ github.ref_name }}
            
            **Container:** ${{ matrix.container }}
            **Size:** ${{ steps.tarball.outputs.size }}
            
            ### Files
            - `${{ steps.tarball.outputs.name }}`
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
