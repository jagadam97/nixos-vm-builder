name: Build and Deploy LXC Containers

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        container:
          - influxdb-lxc
            
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build ${{ matrix.container }}
        run: |
          make ${{ matrix.container }}

      - name: Prepare release info
        id: release
        run: |
          TARBALL=$(ls result/tarball/*.tar.xz)
          FILENAME=$(basename "${TARBALL}")
          SIZE=$(du -h "${TARBALL}" | cut -f1)

          # Extract version and container name from filename (<container>-v<version>.tar.xz)
          VERSION=$(echo "$FILENAME" | sed -n 's/.*-\(v[0-9][^.]*\.[^.]*\.[^.]*\)\.tar\.xz/\1/p')
          CONTAINER=$(echo "$FILENAME" | sed -n 's/\(.*\)-v[0-9].*\.tar\.xz/\1/p')
          TAG="${CONTAINER}-${VERSION}"

          echo "path=${TARBALL}" >> $GITHUB_OUTPUT
          echo "name=${FILENAME}" >> $GITHUB_OUTPUT
          echo "size=${SIZE}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "container=${CONTAINER}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

          echo "Tarball: ${TARBALL} (${SIZE})"
          echo "Release tag: ${TAG}"

      - name: Delete existing release if present
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          if gh release view "${TAG}" &>/dev/null; then
            echo "Deleting existing release ${TAG}..."
            gh release delete "${TAG}" --yes --cleanup-tag
          else
            echo "No existing release for ${TAG}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          gh release create "${{ steps.release.outputs.tag }}" \
            result/tarball/*.tar.xz \
            --title "${{ steps.release.outputs.container }} ${{ steps.release.outputs.version }}" \
            --notes "**Automated build from commit:** ${{ github.sha }}

          **Container:** ${{ matrix.container }}
          **Version:** ${{ steps.release.outputs.version }}
          **Size:** ${{ steps.release.outputs.size }}
          **Commit:** ${{ github.event.head_commit.message }}

          ### Files
          - \`${{ steps.release.outputs.name }}\`"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create versioned release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          if gh release view "${TAG}" &>/dev/null; then
            echo "Deleting existing release ${TAG}..."
            gh release delete "${TAG}" --yes --cleanup-tag
          fi
          gh release create "${{ github.ref_name }}" \
            result/tarball/*.tar.xz \
            --title "${{ steps.release.outputs.container }} ${{ steps.release.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
