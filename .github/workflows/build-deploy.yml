name: Build and Deploy LXC Containers

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      containers: ${{ steps.discover.outputs.containers }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Discover containers
        id: discover
        run: |
          # Find all container directories and format as JSON array
          CONTAINERS=$(ls -d containers/*/ 2>/dev/null | xargs -n1 basename | grep -v '^common$' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "containers=$CONTAINERS" >> $GITHUB_OUTPUT
          echo "Found containers: $CONTAINERS"

  build-and-deploy:
    needs: discover
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        container: ${{ fromJson(needs.discover.outputs.containers) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: jagadam97
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build ${{ matrix.container }}-lxc
        run: |
          make ${{ matrix.container }}-lxc

      - name: Push to Cachix
        run: |
          echo "Pushing all build artifacts to Cachix..."
          # Push the result and its full closure recursively
          nix path-info --recursive result | cachix push jagadam97
          echo "Pushed closure to https://jagadam97.cachix.org"

      - name: Prepare release info
        if: github.event_name != 'pull_request'
        id: release
        run: |
          TARBALL=$(ls result/tarball/*.tar.xz)
          FILENAME=$(basename "${TARBALL}")
          SIZE=$(du -h "${TARBALL}" | cut -f1)

          # Extract version and container name from filename (<container>-v<version>.tar.xz)
          # Version can contain dots, underscores, and dashes (e.g., v10.11.6_7.1.2-2)
          VERSION=$(echo "$FILENAME" | sed -n 's/.*-\(v[0-9][^[:space:]]*\)\.tar\.xz/\1/p')
          CONTAINER=$(echo "$FILENAME" | sed -n 's/\(.*\)-v[0-9].*\.tar\.xz/\1/p')
          TAG="${CONTAINER}-${VERSION}"

          echo "path=${TARBALL}" >> $GITHUB_OUTPUT
          echo "name=${FILENAME}" >> $GITHUB_OUTPUT
          echo "size=${SIZE}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "container=${CONTAINER}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

          echo "Tarball: ${TARBALL} (${SIZE})"
          echo "Release tag: ${TAG}"

      - name: Delete existing release if present
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.release.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Delete ALL previous releases for this container
          CONTAINER="${{ steps.release.outputs.container }}"
          echo "Deleting all previous releases for ${CONTAINER}..."
          for old_release in $(gh release list --json tagName --jq '.[].tagName' | grep "^${CONTAINER}-v"); do
            echo "Deleting release: ${old_release}"
            gh release delete "${old_release}" --yes || true
            git push --delete origin "${old_release}" 2>/dev/null || true
            git tag -d "${old_release}" 2>/dev/null || true
          done

          # Create new tag at current commit and push
          TAG="${{ steps.release.outputs.tag }}"
          git tag ${TAG}
          git push origin ${TAG}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.release.outcome == 'success'
        run: |
          gh release create "${{ steps.release.outputs.tag }}" \
            result/tarball/*.tar.xz \
            --title "${{ steps.release.outputs.container }} ${{ steps.release.outputs.version }}" \
            --notes "**Automated build from commit:** ${{ github.sha }}

          **Container:** ${{ matrix.container }}
          **Version:** ${{ steps.release.outputs.version }}
          **Size:** ${{ steps.release.outputs.size }}
          **Commit:** ${{ github.event.head_commit.message }}

          ### Files
          - \`${{ steps.release.outputs.name }}\`"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create versioned release (tag push)
        if: startsWith(github.ref, 'refs/tags/') && steps.release.outcome == 'success'
        run: |
          CONTAINER="${{ steps.release.outputs.container }}"

          # Delete ALL previous releases for this container
          echo "Deleting all previous releases for ${CONTAINER}..."
          for old_release in $(gh release list --json tagName --jq '.[].tagName' | grep "^${CONTAINER}-v"); do
            echo "Deleting release: ${old_release}"
            gh release delete "${old_release}" --yes || true
            git push --delete origin "${old_release}" 2>/dev/null || true
            git tag -d "${old_release}" 2>/dev/null || true
          done

          gh release create "${{ github.ref_name }}" \
            result/tarball/*.tar.xz \
            --title "${{ steps.release.outputs.container }} ${{ steps.release.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
