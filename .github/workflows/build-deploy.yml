name: Build and Deploy LXC Containers

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        container:
          - influxdb-lxc
            
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build ${{ matrix.container }}
        run: |
          make ${{ matrix.container }}

      - name: Find built tarball
        id: tarball
        run: |
          TARBALL=$(ls nixos-influxdb-*.tar.xz)
          echo "path=${TARBALL}" >> $GITHUB_OUTPUT
          echo "name=${TARBALL}" >> $GITHUB_OUTPUT
          echo "Found: ${TARBALL}"
          
          # Get file size for display
          SIZE=$(du -h ${TARBALL} | cut -f1)
          echo "size=${SIZE}" >> $GITHUB_OUTPUT

      - name: Generate release tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: release_tag
        run: |
          # Extract version from filename (nixos-influxdb-vX.Y.Z.tar.xz)
          FILENAME="${{ steps.tarball.outputs.name }}"
          VERSION=$(echo "$FILENAME" | sed -n 's/nixos-influxdb-\(v[^.]*\.[^.]*\.[^.]*\)\.tar\.xz/\1/p')
          TAG="${VERSION}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Release tag: ${TAG}"

      - name: Create Latest Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: "InfluxDB ${{ steps.release_tag.outputs.version }} - Build"
          files: ${{ steps.tarball.outputs.path }}
          body: |
            **Automated build from commit:** ${{ github.sha }}
            
            **Container:** ${{ matrix.container }}
            **Version:** ${{ steps.release_tag.outputs.version }}
            **Size:** ${{ steps.tarball.outputs.size }}
            **Commit:** ${{ github.event.head_commit.message }}
            
            ### Files
            - `${{ steps.tarball.outputs.name }}`
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Versioned Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.tarball.outputs.path }}
          body: |
            **Version Release:** ${{ github.ref_name }}
            
            **Container:** ${{ matrix.container }}
            **Size:** ${{ steps.tarball.outputs.size }}
            
            ### Files
            - `${{ steps.tarball.outputs.name }}`
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
